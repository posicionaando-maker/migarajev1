<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin Conexión - Garaje en Línea</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #1a1a1a;
            color: #f0e6d3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 400px;
            background: #2d2d2d;
            padding: 40px 30px;
            border-radius: 12px;
            border: 1px solid #4a4a4a;
        }
        h1 { font-size: 3rem; margin: 0 0 16px 0; }
        h2 { color: #d4a373; margin-bottom: 8px; }
        p { color: #c4b59a; line-height: 1.6; }
        .btn {
            display: inline-block;
            background: #d4a373;
            color: #1a1a1a;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 16px;
        }
        .btn:hover { background: #e8c39e; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📡</h1>
        <h2>Sin conexión</h2>
        <p>
            No tienes acceso a internet en este momento.<br>
            Pero no te preocupes, los productos que ya habías visto están disponibles.
        </p>
        <a href="/" class="btn">Ver catálogo guardado</a>
        <p style="font-size:0.8rem;margin-top:16px;">
            Cuando recuperes conexión, los productos se actualizarán.
        </p>
    </div>
</body>
</html>
